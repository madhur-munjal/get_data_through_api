<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>New Support Request</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background-color: #f4f6f9;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
    }
    .container {
      max-width: 600px;
      margin: 40px auto;
      background-color: #ffffff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      padding: 30px;
    }
    .header {
      border-bottom: 1px solid #e6e6e6;
      padding-bottom: 10px;
      margin-bottom: 20px;
      text-align: center;
    }
    .header h2 {
      margin: 0;
      color: #333333;
    }
    .content p {
      color: #555;
      line-height: 1.6;
      font-size: 15px;
    }
    .label {
      font-weight: bold;
      margin-top: 15px;
      color: #333;
    }
    .value {
      color: #444;
      background-color: #f1f1f1;
      padding: 10px 15px;
      border-radius: 5px;
      margin-top: 5px;
      font-family: monospace;
    }
    .footer {
      font-size: 12px;
      color: #999;
      text-align: center;
      margin-top: 30px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h2>New Support Request Received</h2>
    </div>

    <div class="content">
      <p>A new support request has been submitted by a client. Below are the details:</p>

      <div class="label">Name:</div>
      <div class="value">John Doe</div>

      <div class="label">Email:</div>
      <div class="value">john.doe@example.com</div>

      <div class="label">Subject:</div>
      <div class="value">Help with purchasing a premium plan</div>

      <!-- <div class="label">Message:</div>
      <div class="value">
        Hello, I need assistance choosing the right plan for my business. Please advise on the best option and how to proceed with the purchase.
      </div> -->
    </div>

    <div class="footer">
      &copy; 2025 Smart Heal. All rights reserved.<br>
      Need help? Please write us at support@smarthealapp.com.
    </div>
  </div>

</body>
</html>
