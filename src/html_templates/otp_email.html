<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your OTP Code</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f5f6fa;
      font-family: Arial, sans-serif;
    }
    .container {
      max-width: 600px;
      margin: 40px auto;
      background-color: #ffffff;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      padding: 30px;
      text-align: center;
    }
    .logo {
      margin-bottom: 20px;
    }
    .otp-box {
      font-size: 28px;
      font-weight: bold;
      color: #333;
      background-color: #f0f0f0;
      display: inline-block;
      padding: 12px 24px;
      border-radius: 6px;
      letter-spacing: 5px;
      margin: 20px 0;
    }
    .footer {
      font-size: 12px;
      color: #888;
      margin-top: 30px;
    }
    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }
      .otp-box {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- <img src="https://yourdomain.com/logo.png" alt="Company Logo" class="logo" width="120"> -->
    <p>Please use the following OTP to complete your action. This OTP is valid for 10 minutes.</p>

    <h2>Your OTP is:</h2>

    <div class="otp-box">{{ otp }}</div> <!-- Replace with dynamic OTP -->

    <p>If you did not request this, please ignore this email or contact support.</p>

    <div class="footer">
      &copy; 2025 Smart Heal. All rights reserved.<br>
      Need help? Please write us at support@smarthealapp.com.
    </div>
  </div>

</body>
</html>
