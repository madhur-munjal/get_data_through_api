#version: "3.8"

services:
  db:
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 20
#      retries: 5
    image: mysql:8
    container_name: mysql_container_db
    restart: always
    environment:
      MYSQL_DATABASE: my_db
    env_file:
      - .env
    ports:
      - "3306:3306"

  fastapi_web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
#    volumes:
#      - /app/backend/src/uploads:/src/uploads

    env_file:
      - .env

volumes:
  db_data: